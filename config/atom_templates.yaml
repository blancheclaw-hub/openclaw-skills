# 原子组合模板配置
# 根据项目复杂度匹配角色和原子组合

# 简单项目：聚合多个原子为轻量原子
simple_project:
  complexity: simple
  roles:
    - name: "全栈执行者"
      atoms: ["Ql", "A", "L", "Vt", "D", "O"]
      responsibilities: "单人完成轻量质检→任务承接→编码→测试→交付→迭代"
      output: "《轻量质检报告》《效能KPI报告》"
  atom_meanings:
    Ql: "轻量品控（聚合Qa+Qp+Vt）"
    A: "任务承接"
    L: "逻辑编码"
    Vt: "测试验证"
    D: "开源交付"
    O: "迭代优化"

# 中等项目：部分拆分
medium_project:
  complexity: medium
  roles:
    - name: "需求分析师"
      atoms: ["I", "T", "K"]
      responsibilities: "收集需求、本质翻译、量化需求精准度"
      output: "《痛点清单》《任务清单》《需求KPI报告》"
    - name: "校准验证师"
      atoms: ["C", "V", "F", "K"]
      responsibilities: "校准方向、MVS迭代、反馈聚类、KPI量化"
      output: "《校准报告》《测试反馈》《Top3诉求》《需求KPI报告》"
  atom_meanings:
    I: "需求洞察"
    T: "需求翻译"
    C: "研发校准"
    V: "试错验证"
    F: "反馈反哺"
    K: "KPI反馈"

# 复杂项目：完整原子链
complex_project:
  complexity: complex
  roles:
    - name: "项目质检官"
      atoms: ["Qa", "Qa", "Vt", "Ki"]
      responsibilities: "参与需求评审→架构设计→过程审计→测试验收"
      output: "《全流程质检报告》《效能KPI报告》"
    - name: "模块开发工程师"
      atoms: ["A", "L", "Ki"]
      responsibilities: "承接任务、编码实现"
      output: "《开发手册》《效能KPI报告》"
    - name: "开源交付专员"
      atoms: ["D", "Ki"]
      responsibilities: "GitHub交付、维护文档、收集外部反馈"
      output: "《GitHub仓库链接》《效能KPI报告》"
  atom_meanings:
    Qa: "需求架构质检"
    Qp: "开发过程品控"
    Vt: "测试验证"
    Ki: "KPI量化"
    A: "任务承接"
    L: "逻辑编码"
    D: "开源交付"

# 原子定义（所有可用原子）
atom_definitions:
  # 市场部原子
  I: "需求洞察 - 收集原始需求，过滤伪需求"
  T: "需求翻译 - 第一性原理归因本质"
  C: "研发校准 - 主持对齐会"
  V: "试错验证 - MVS迭代测试"
  F: "反馈反哺 - 监控用户反馈"
  K: "KPI反馈 - 量化需求精准度"
  
  # 开发部原子
  A: "任务承接 - 读取任务清单，创建Jira卡片"
  L: "逻辑编码 - 实现模块逻辑"
  Ql: "轻量品控 - 简单项目聚合质检"
  Qa: "需求架构质检 - 参与需求评审"
  Qp: "开发过程品控 - 动态审计代码规范"
  Vt: "测试验证 - 执行终态测试"
  D: "开源交付 - GitHub上传集成"
  O: "迭代优化 - 优化技能"
  Co: "项目群统筹 - 监控多项目进度"
  Ri: "风险预警 - 识别跨项目风险"
  Ps: "品控标准统合 - 制定品控手册"
  Pr: "进度监控 - 跟踪里程碑"
  Ki: "KPI量化 - 嵌入各原子报告"
  Vm: "虚拟代理 - 峰值负载时激活"
  
  # 研究部原子
  R: "技术调研 - 跟踪前沿技术"
  K_ru: "知识架构 - 构建知识图谱"
  B: "实践提炼 - 从案例提炼范式"
  M: "工具维护 - 管理工具链"
  S: "技能标签 - 标注工程师技能"
